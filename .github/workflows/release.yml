name: Build & release installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.3.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @claude-sync/cli build
      - run: pnpm -F @claude-sync/desktop ${{ matrix.script }}
        env:
          # Token enables electron-builder to push to GitHub Releases on tag builds
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing in CI (we don't have certs yet)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Show artifacts
        if: always()
        shell: bash
        run: ls -la desktop/dist-installer/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          # actions/upload-artifact does NOT support brace expansion. List separately.
          path: |
            desktop/dist-installer/*.exe
            desktop/dist-installer/*.dmg
            desktop/dist-installer/*.zip
            desktop/dist-installer/*.yml
            desktop/dist-installer/*.blockmap
          if-no-files-found: warn