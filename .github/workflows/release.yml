name: Build & release installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # allow electron-builder to publish installers to a GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.3.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @claude-sync/cli build
      - run: pnpm -F @claude-sync/desktop ${{ matrix.script }}
        env:
          # GitHub Release publisher
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (only set on the mac job; Windows job sees empty values and skips signing)
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization via Apple's notarytool (electron-builder reads these directly)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Show artifacts
        if: always()
        shell: bash
        run: ls -la desktop/dist-installer/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            desktop/dist-installer/*.exe
            desktop/dist-installer/*.dmg
            desktop/dist-installer/*.zip
            desktop/dist-installer/*.yml
            desktop/dist-installer/*.blockmap
          if-no-files-found: warn